<!-- Navigation Bar - New Layout -->
<header id="header" style="z-index: 999;">
    <div class="container">
        <div class="header-wrapper">
            <!-- Left Side: Logo -->
            <div class="header-left">
                <div class="logo-container">
                    <a href="{{ url_for('index') }}" class="logo-link">
                        <img src="{{ url_for('static', filename='logo.png') }}" alt="Printing Solutions Logo"
                            class="logo">
                    </a>
                </div>
            </div>

            <!-- Right Side: Contact Info and Navigation -->
            <div class="header-right">

                <!-- Bottom: Navigation Links -->
                <nav class="main-nav">
                    <div class="mobile-menu-btn" id="mobileMenuBtn">
                        <i class="fas fa-bars"></i>
                    </div>
                    <ul class="nav-links" id="navLinks">
                    <li><a href="{{ url_for('index') }}">Home</a></li>
                    <li><a href="{{ url_for('discovery_model') }}">Console</a></li>
                    <li><a href="{{ url_for('about_us') }}">About Us</a></li>
                    {% if session.get('user_id') %}
                        <li><a href="{{ url_for('auth.user_profile') }}">Profile</a></li>
                        <li><a href="{{ url_for('auth.logout') }}">Logout</a></li>
                    {% else %}
                        <li><a href="{{ url_for('auth.login_page') }}">Login</a></li>
                    {% endif %}
                </ul>
                </nav>
            </div>
        </div>
    </div>
</header>
