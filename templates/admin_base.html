<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='Small_logo.png') }}" type="image/png">
    <title>{% block title %}Admin Dashboard{% endblock %}</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #1c5fa2;
            --primary-light: #4076ab;
            --primary-dark: #185491;
            --text-color: #333;
            --text-light: #f8f9fa;
            --bg-light: #f8f9fa;
            --bg-white: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-hover: #e9ecef;
            --sidebar-width: 250px;
            --sidebar-collapsed-width: 70px;
            --header-height: 60px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --border-radius: 16px;
            --transition: all 0.3s ease;

            /* Text colors for better contrast */
            --text-secondary: #666;
            --text-muted: #999;
            --text-strong: #222;

            /* Border colors */
            --border-color: rgba(0, 0, 0, 0.1);

            /* Input and form colors */
            --input-bg: #ffffff;
            --input-border: #ddd;

            /* Status and utility colors */
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
            --secondary-color: #6c757d;

            /* Additional colors for better theming */
            --dark-color: #ffffff;
            --darker-color: #f8f9fa;
        }

        /* Dark mode variables */
        [data-theme="dark"] {
            --text-color: #e4e6ea;
            --text-secondary: #b0b3b8;
            --text-muted: #8a8d91;
            --text-strong: #f0f2f5;
            --bg-light: #333333;
            --bg-white: #404040;
            --bg-secondary: #3a3b3c;
            --bg-hover: #4e4f50;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: #3a3b3c;
            --input-border: #5a5b5c;

            /* Dark mode primary colors - updated to match requested color */
            --primary-color: #1c5fa2;
            --primary-light: #4076ab;
            --primary-dark: #185491;

            /* Status colors adjusted for dark mode */
            --success-color: #42b883;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --info-color: #3498db;
            --secondary-color: #95a5a6;

            /* Additional colors for dark mode */
            --dark-color: #242526;
            --darker-color: #18191a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
            padding: 20px;
        }

        /* Base layout elements - sidebar, header, content */
        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            padding: 0;
            height: calc(100vh - 40px);
            position: fixed;
            transition: var(--transition);
            z-index: 100;
            overflow-x: hidden;
            overflow-y: auto;
            color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .toggle-btn {
            position: relative;
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar.collapsed .sidebar-header {
            justify-content: center;
        }

        .sidebar-header h3 {
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
            margin-left: 20px;
            margin-bottom: 0;
        }

        .sidebar-menu {
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed .sidebar-menu {
            flex-direction: column;
            padding: 2rem 0;
        }

        .menu-item {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            transition: var(--transition);
            position: relative;
            white-space: nowrap;
            border-left: 4px solid transparent;
            margin: 0.5rem 0;
        }

        .menu-item i {
            margin-right: 1rem;
            width: 24px;
            text-align: center;
            transition: var(--transition);
            font-size: 1.2rem;
        }

        .menu-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border-left: 4px solid white;
        }

        .menu-item.active {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            border-left: 4px solid white;
        }

        .header {
            position: fixed;
            top: 20px;
            right: 20px;
            left: calc(var(--sidebar-width) + 40px);
            height: var(--header-height);
            background-color: var(--bg-white);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            padding: 2.5rem 1.5rem;
            transition: var(--transition);
            z-index: 99;
            border-radius: var(--border-radius);
        }

        .header.expanded {
            left: calc(var(--sidebar-collapsed-width) + 40px);
        }

        .header-logo {
            display: flex;
            align-items: center;
        }

        .header-logo img {
            height: 36px;
            margin-right: 12px;
        }

        .header-logo h2 {
            color: var(--primary-color);
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .content {
            margin-left: calc(var(--sidebar-width) + 20px);
            margin-top: calc(var(--header-height) + 40px);
            flex: 1;
            padding: 2rem;
            transition: var(--transition);
        }

        .content.expanded {
            margin-left: calc(var(--sidebar-collapsed-width) + 20px);
        }

        /* Common content elements */
        .content-header {
            margin-bottom: 2rem;
        }

        .content-header h2 {
            color: var(--text-color);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .content-header p {
            color: var(--text-secondary);
        }

        .main-content {
            background-color: var(--bg-white);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: var(--shadow);
            min-height: 400px;
        }

        .theme-toggle {
            position: fixed;
            top: 45px;
            right: 40px;
            z-index: 1000;
            background: var(--bg-white);
            border: 2px solid var(--border-color);
            border-radius: 50px;
            width: 60px;
            height: 30px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            padding: 2px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .theme-toggle:hover {
            border-color: var(--primary-color);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .theme-toggle:active {
            transform: scale(0.98);
        }

        .theme-toggle-indicator {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            transform: translateX(0);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .theme-toggle-indicator::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 50%);
            transition: var(--transition);
        }

        [data-theme="dark"] .theme-toggle-indicator {
            transform: translateX(28px);
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
        }

        /* Theme toggle animation */
        .theme-toggle-indicator i {
            transition: var(--transition);
            position: relative;
            z-index: 1;
        }

        /* Smooth theme transition for better UX */
        .theme-transition,
        .theme-transition *,
        .theme-transition *:before,
        .theme-transition *:after {
            transition: background-color 0.4s ease,
                color 0.4s ease,
                border-color 0.4s ease,
                box-shadow 0.4s ease !important;
        }

        /* 确保body和html也有过渡效果 */
        html.theme-transition,
        html.theme-transition body {
            transition: background-color 0.4s ease,
                color 0.4s ease !important;
        }

        /* 确保所有输入元素也有过渡效果 */
        .theme-transition input,
        .theme-transition textarea,
        .theme-transition select,
        .theme-transition button {
            transition: background-color 0.4s ease,
                color 0.4s ease,
                border-color 0.4s ease !important;
        }

        /* Additional dark mode improvements for forms and inputs */
        input,
        textarea,
        select {
            background-color: var(--input-bg) !important;
            border-color: var(--input-border) !important;
            color: var(--text-color) !important;
        }

        .form-control {
            background-color: var(--input-bg) !important;
            border-color: var(--input-border) !important;
            color: var(--text-color) !important;
        }

        .form-control:focus {
            background-color: var(--input-bg) !important;
            border-color: var(--primary-color) !important;
            color: var(--text-color) !important;
            box-shadow: 0 0 0 0.2rem rgba(28, 95, 162, 0.25) !important;
        }

        /* Tables in dark mode */
        .table {
            color: var(--text-color) !important;
        }

        .table th {
            border-color: var(--border-color) !important;
            background-color: var(--bg-light) !important;
        }

        .table td {
            border-color: var(--border-color) !important;
        }

        /* Buttons and badges */
        .btn-outline-primary {
            border-color: var(--primary-color) !important;
            color: var(--primary-color) !important;
        }

        .btn-outline-primary:hover {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
        }

        /* Card components */
        .card {
            background-color: var(--bg-white) !important;
            border-color: var(--border-color) !important;
        }

        .card-header {
            background-color: var(--bg-light) !important;
            border-color: var(--border-color) !important;
        }

        /* Modal dialogs */
        .modal-content {
            background-color: var(--bg-white) !important;
            border-color: var(--border-color) !important;
        }

        .modal-header {
            background-color: var(--bg-light) !important;
            border-color: var(--border-color) !important;
        }

        .modal-body {
            background-color: var(--bg-white) !important;
            color: var(--text-color) !important;
        }

        .modal-footer {
            background-color: var(--bg-light) !important;
            border-color: var(--border-color) !important;
        }

        /* Dropdown menus */
        .dropdown-menu {
            background-color: var(--bg-white) !important;
            border-color: var(--border-color) !important;
        }

        .dropdown-item {
            color: var(--text-color) !important;
        }

        .dropdown-item:hover,
        .dropdown-item:focus {
            background-color: var(--bg-light) !important;
            color: var(--text-color) !important;
        }

        /* Navbar and navigation */
        .navbar {
            background-color: var(--bg-white) !important;
            border-color: var(--border-color) !important;
        }

        .nav-link {
            color: var(--text-color) !important;
        }

        /* .nav-link:hover,
        .nav-link:focus {
            color: var(--primary-color) !important;
        } */

        /* Alerts */
        .alert {
            border-color: var(--border-color) !important;
        }

        .alert-info {
            background-color: var(--bg-light) !important;
            border-color: var(--info-color) !important;
            color: var(--text-color) !important;
        }

        .alert-warning {
            background-color: var(--bg-light) !important;
            border-color: #ffc107 !important;
            color: var(--text-color) !important;
        }

        .alert-danger {
            background-color: var(--bg-light) !important;
            border-color: #dc3545 !important;
            color: var(--text-color) !important;
        }

        .alert-success {
            background-color: var(--bg-light) !important;
            border-color: #198754 !important;
            color: var(--text-color) !important;
        }

        /* Breadcrumbs */
        .breadcrumb {
            background-color: var(--bg-light) !important;
        }

        .breadcrumb-item a {
            color: var(--primary-color) !important;
        }

        /* Pagination */
        .page-link {
            background-color: var(--bg-white) !important;
            border-color: var(--border-color) !important;
            color: var(--text-color) !important;
        }

        .page-link:hover {
            background-color: var(--bg-light) !important;
            border-color: var(--primary-color) !important;
            color: var(--primary-color) !important;
        }

        .page-item.active .page-link {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
        }

        /* List groups */
        .list-group-item {
            background-color: var(--bg-white) !important;
            border-color: var(--border-color) !important;
            color: var(--text-color) !important;
        }

        .list-group-item:hover {
            background-color: var(--bg-light) !important;
        }

        /* Progress bars */
        .progress {
            background-color: var(--bg-light) !important;
        }

        /* Tooltips and popovers */
        .tooltip-inner {
            background-color: var(--bg-white) !important;
            color: var(--text-color) !important;
            border: 1px solid var(--border-color) !important;
        }

        .popover {
            background-color: var(--bg-white) !important;
            border-color: var(--border-color) !important;
        }

        .popover-header {
            background-color: var(--bg-light) !important;
            border-color: var(--border-color) !important;
            color: var(--text-color) !important;
        }

        .popover-body {
            color: var(--text-color) !important;
        }

        /* Collapsed sidebar styles */
        .sidebar.collapsed .sidebar-header h3,
        .sidebar.collapsed .menu-item span {
            display: none;
        }

        .sidebar.collapsed .menu-item {
            padding: 1rem 1.5rem;
            margin: 0.5rem 0;
            justify-content: flex-start;
            border-radius: 0;
            border-left: 4px solid transparent;
            background-color: transparent;
            width: 100%;
            height: auto;
        }

        .sidebar.collapsed .menu-item i {
            margin-right: 0;
        }

        .sidebar.collapsed .menu-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: none;
            border-left: 4px solid white;
        }

        .sidebar.collapsed .menu-item.active {
            background-color: rgba(255, 255, 255, 0.15);
            border-left: 4px solid white;
        }

        .sidebar.collapsed .menu-item.active::after {
            display: none;
        }

        .sidebar.collapsed .sidebar-header {
            border-bottom: none;
            margin-bottom: 0;
            padding: 15px 0 5px 0;
        }

        @media (max-width: 991px) {
            body {
                padding: 10px;
            }

            .sidebar {
                width: var(--sidebar-collapsed-width);
                margin: 10px 0 10px 10px;
            }

            .sidebar .sidebar-menu {
                align-items: center;
                flex-direction: row;
                justify-content: center;
                flex-wrap: wrap;
                padding: 0;
                gap: 15px;
            }

            .sidebar .sidebar-header h3 {
                display: none;
            }

            .sidebar .menu-item {
                padding: 1rem;
                margin: 0;
                width: 40px;
                height: 40px;
                justify-content: center;
                border-radius: 50%;
                border-left: none;
                background-color: rgba(255, 255, 255, 0.1);
            }

            .sidebar .menu-item span {
                display: none;
            }

            .sidebar .menu-item i {
                margin: 0;
            }

            .sidebar .menu-item.active::after {
                content: '';
                position: absolute;
                bottom: -3px;
                left: 50%;
                transform: translateX(-50%);
                width: 5px;
                height: 5px;
                background-color: white;
                border-radius: 50%;
            }

            .header {
                left: calc(var(--sidebar-collapsed-width) + 20px);
                top: 10px;
                right: 10px;
            }

            .content {
                margin-left: calc(var(--sidebar-collapsed-width) + 10px);
                margin-top: calc(var(--header-height) + 20px);
            }

            .toggle-btn {
                display: none;
            }

            .theme-toggle {
                top: 20px;
                right: 20px;
                width: 50px;
                height: 25px;
                z-index: 1001;
            }

            .theme-toggle-indicator {
                width: 20px;
                height: 20px;
                font-size: 10px;
            }

            [data-theme="dark"] .theme-toggle-indicator {
                transform: translateX(23px);
            }
        }

        /* 全局Bootstrap覆盖规则 - 确保暗色模式正确应用 */
        [data-theme="dark"] body {
            background-color: var(--bg-light) !important;
            color: var(--text-color) !important;
        }

        [data-theme="dark"] .card {
            background-color: var(--bg-white) !important;
            border-color: var(--border-color) !important;
            color: var(--text-color) !important;
        }

        [data-theme="dark"] .table {
            background-color: var(--bg-white) !important;
            color: var(--text-color) !important;
        }

        [data-theme="dark"] .table th,
        [data-theme="dark"] .table td {
            background-color: var(--bg-white) !important;
            border-color: var(--border-color) !important;
            color: var(--text-color) !important;
        }

        [data-theme="dark"] .table-responsive {
            background-color: var(--bg-white) !important;
        }

        [data-theme="dark"] .modal-content {
            background-color: var(--bg-white) !important;
            color: var(--text-color) !important;
        }

        [data-theme="dark"] .form-control,
        [data-theme="dark"] .form-select,
        [data-theme="dark"] input,
        [data-theme="dark"] select,
        [data-theme="dark"] textarea {
            background-color: var(--input-bg) !important;
            border-color: var(--input-border) !important;
            color: var(--text-color) !important;
        }

        [data-theme="dark"] .btn-outline-secondary {
            color: var(--text-color) !important;
            border-color: var(--border-color) !important;
        }

        [data-theme="dark"] .btn-outline-secondary:hover {
            background-color: var(--bg-light) !important;
            color: var(--text-color) !important;
        }

        /* Additional dark mode overrides for better font visibility */
        [data-theme="dark"] h1,
        [data-theme="dark"] h2,
        [data-theme="dark"] h3,
        [data-theme="dark"] h4,
        [data-theme="dark"] h5,
        [data-theme="dark"] h6 {
            color: var(--text-color) !important;
        }

        [data-theme="dark"] p,
        [data-theme="dark"] span,
        [data-theme="dark"] div {
            color: var(--text-color) !important;
        }

        [data-theme="dark"] .text-muted {
            color: var(--text-muted) !important;
        }

        [data-theme="dark"] .text-secondary {
            color: var(--text-secondary) !important;
        }

        [data-theme="dark"] label {
            color: var(--text-color) !important;
        }

        [data-theme="dark"] .badge {
            background-color: var(--bg-secondary) !important;
            color: var(--text-color) !important;
        }

        [data-theme="dark"] .list-group-item {
            background-color: var(--bg-white) !important;
            color: var(--text-color) !important;
            border-color: var(--border-color) !important;
        }

        [data-theme="dark"] .accordion-button {
            background-color: var(--bg-white) !important;
            color: var(--text-color) !important;
            border-color: var(--border-color) !important;
        }

        [data-theme="dark"] .accordion-body {
            background-color: var(--bg-white) !important;
            color: var(--text-color) !important;
        }
    </style>
    {% block page_css %}{% endblock %}
    {% block head_extra %}{% endblock %}

    <!-- 在页面渲染前立即设置主题，避免闪烁 -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('admin-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            // 添加一个临时的CSS规则来确保初始渲染时没有闪烁
            const style = document.createElement('style');
            style.textContent = `
                * {
                    transition: none !important;
                }
            `;
            document.head.appendChild(style);

            // 页面加载完成后移除临时样式
            window.addEventListener('load', function() {
                setTimeout(() => {
                    style.remove();
                }, 100);
            });
        })();
    </script>
</head>

<body>
    <!-- Theme Toggle Button -->
    <div class="theme-toggle" id="themeToggle" title="Toggle Theme">
        <div class="theme-toggle-indicator">
            <i class="fas fa-sun" id="themeIcon"></i>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="toggle-btn">
                <i class="fas fa-chevron-left"></i>
            </div>
            <h3>Admin Panel</h3>
        </div>

        <nav class="sidebar-menu">
            <a href="/admin" class="menu-item {% block dashboard_active %}{% endblock %}" title="Dashboard">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
            <a href="/admin/manage_users" class="menu-item {% block manage_users_active %}{% endblock %}"
                title="Manage Users">
                <i class="fas fa-users"></i>
                <span>Manage Users</span>
            </a>
            <a href="/admin/manage_model" class="menu-item {% block manage_models_active %}{% endblock %}"
                title="Manage Models">
                <i class="fas fa-brain"></i>
                <span>Manage Models</span>
            </a> <a href="/admin/modify_config" class="menu-item {% block configuration_active %}{% endblock %}"
                title="Configuration">
                <i class="fas fa-cog"></i>
                <span>Configuration</span>
            </a>
            <a href="/auth/logout" class="menu-item" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Log out</span>
            </a>
        </nav>
    </aside>

    <!-- Header -->
    <header class="header">
        <div class="header-logo">
            <img src="/static/logo2.png" alt="Logo">
            <h2>{% block header_title %}Smart Assistant{% endblock %}</h2>
        </div>
    </header>

    <!-- Main Content -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuItems = document.querySelectorAll('.menu-item');
            const sidebar = document.querySelector('.sidebar');
            const header = document.querySelector('.header');
            const content = document.querySelector('.content');
            const toggleBtn = document.querySelector('.toggle-btn');
            const toggleIcon = toggleBtn.querySelector('i');

            // Theme toggle functionality
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const body = document.body;

            // 主题已经在head中设置，这里只需要更新图标
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            updateThemeIcon(currentTheme);            // Theme toggle click handler with smooth transition
            themeToggle.addEventListener('click', function () {
                // Add transition class for smooth animation
                document.documentElement.classList.add('theme-transition');
                body.classList.add('theme-transition');

                const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';

                // Add a small delay for better visual feedback
                setTimeout(() => {
                    setTheme(newTheme);
                    localStorage.setItem('admin-theme', newTheme);

                    // Remove transition class after animation completes
                    setTimeout(() => {
                        document.documentElement.classList.remove('theme-transition');
                        body.classList.remove('theme-transition');
                    }, 450);
                }, 50);
            });

            // Add hover effect for theme toggle
            themeToggle.addEventListener('mouseenter', function () {
                this.style.transform = 'scale(1.1)';
            });

            themeToggle.addEventListener('mouseleave', function () {
                this.style.transform = 'scale(1)';
            });

            function updateThemeIcon(theme) {
                // 只更新图标，不改变主题
                if (theme === 'dark') {
                    themeIcon.className = 'fas fa-moon';
                } else {
                    themeIcon.className = 'fas fa-sun';
                }
            }

            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);

                // Update icon with smooth transition
                themeIcon.style.opacity = '0';

                setTimeout(() => {
                    updateThemeIcon(theme);
                    themeIcon.style.opacity = '1';
                }, 150);

                // Optional: Add theme change notification
                showThemeNotification(theme);
            }

            // Optional theme change notification
            function showThemeNotification(theme) {
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 80px;
                    right: 30px;
                    background: var(--bg-white);
                    color: var(--text-color);
                    padding: 10px 15px;
                    border-radius: 8px;
                    box-shadow: var(--shadow);
                    border: 1px solid var(--border-color);
                    z-index: 1001;
                    font-size: 14px;
                    opacity: 0;
                    transform: translateY(-10px);
                    transition: all 0.3s ease;
                `;

                notification.textContent = `Switched to ${theme} mode`;
                document.body.appendChild(notification);

                // Animate in
                setTimeout(() => {
                    notification.style.opacity = '1';
                    notification.style.transform = 'translateY(0)';
                }, 10);

                // Animate out and remove
                setTimeout(() => {
                    notification.style.opacity = '0';
                    notification.style.transform = 'translateY(-10px)';
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.parentNode.removeChild(notification);
                        }
                    }, 300);
                }, 2000);
            }

            // Setup toggle sidebar functionality
            toggleBtn.addEventListener('click', function () {
                sidebar.classList.toggle('collapsed');
                header.classList.toggle('expanded');
                content.classList.toggle('expanded');

                if (sidebar.classList.contains('collapsed')) {
                    toggleIcon.classList.remove('fa-chevron-left');
                    toggleIcon.classList.add('fa-chevron-right');
                } else {
                    toggleIcon.classList.remove('fa-chevron-right');
                    toggleIcon.classList.add('fa-chevron-left');
                }

                // Save sidebar state to localStorage
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
            });

            // Restore sidebar state from localStorage
            const sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (sidebarCollapsed) {
                sidebar.classList.add('collapsed');
                header.classList.add('expanded');
                content.classList.add('expanded');
                toggleIcon.classList.remove('fa-chevron-left');
                toggleIcon.classList.add('fa-chevron-right');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
